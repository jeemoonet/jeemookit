<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy background -->
  <rect x="0" y="0" width="1280" height="720" fill="#152238"/>

  <!-- Giant chapter number watermark -->
  <text x="1240" y="640" font-family="Arial,sans-serif" font-size="420" font-weight="bold" fill="#1E2D48" text-anchor="end">{{CHAPTER_NUM}}</text>

  <!-- Top gold rule + eyebrow -->
  <rect x="100" y="150" width="40" height="4" fill="#C79A3E"/>
  <text x="156" y="157" font-family="Arial,sans-serif" font-size="15" font-weight="bold" letter-spacing="4" fill="#C79A3E">{{EYEBROW}}</text>

  <!-- Chapter title -->
  <text x="100" y="370" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="58" font-weight="bold" fill="#FFFFFF">{{CHAPTER_TITLE}}</text>

  <!-- Gold underline -->
  <rect x="104" y="402" width="200" height="4" fill="#C79A3E"/>

  <!-- Description -->
  <text x="104" y="452" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="19" fill="#9AA6BC">{{CHAPTER_DESC}}</text>

  <!-- Footer -->
  <text x="100" y="682" font-family="Arial,sans-serif" font-size="12" fill="#5C6885">积木网(JEEMOO.COM)</text>
</svg>
